name: Auto-Complete Matured Plans

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  complete-plans:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-complete endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/cron/auto-complete-plans" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then exit 1; fi
